baseURL = "https://papilov.org/"
title = "Artem Papilov"
theme = "cosmos"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[params]
  description = "Independent analytical research: subscription economics, behavioral science, physics explainers. Data-driven, AI-co-authored, openly licensed."
  author = "Artem Papilov"
  twitter = "papilov"
  github = "a-pap"
  linkedin = "papilov"
  email = "artem@papilov.org"
  cfWebAnalyticsToken = "058abfd5c8d44abbac0d4ef05ac33a2d"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokailight"
    lineNos = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[services]
  [services.rss]
    limit = 50

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "EN"
    weight = 1
    [languages.en.params]
      description = "Independent analytical research: subscription economics, behavioral science, physics explainers. Data-driven, AI-co-authored, openly licensed."
    [[languages.en.menu.main]]
      name = "Research"
      url = "/research/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Colophon"
      url = "/colophon/"
      weight = 2

  [languages.ru]
    languageCode = "ru"
    languageName = "RU"
    weight = 2
    [languages.ru.params]
      description = "Аналитические исследования: подписочная экономика, поведенческая наука, физика. С данными, ИИ-соавторством и открытой лицензией."
    [[languages.ru.menu.main]]
      name = "Исследования"
      url = "/ru/research/"
      weight = 1
    [[languages.ru.menu.main]]
      name = "Колофон"
      url = "/ru/colophon/"
      weight = 2

  [languages.es]
    languageCode = "es"
    languageName = "ES"
    weight = 3
    [languages.es.params]
      description = "Investigación analítica: economía de suscripciones, ciencia del comportamiento, física. Basada en datos, co-escrita con IA, licencia abierta."
    [[languages.es.menu.main]]
      name = "Investigación"
      url = "/es/research/"
      weight = 1
    [[languages.es.menu.main]]
      name = "Colofón"
      url = "/es/colophon/"
      weight = 2

  [languages.de]
    languageCode = "de"
    languageName = "DE"
    weight = 4
    [languages.de.params]
      description = "Analytische Forschung: Abo-Ökonomie, Verhaltensforschung, Physik-Erklärungen. Datenbasiert, KI-unterstützt, offen lizenziert."
    [[languages.de.menu.main]]
      name = "Forschung"
      url = "/de/research/"
      weight = 1
    [[languages.de.menu.main]]
      name = "Kolophon"
      url = "/de/colophon/"
      weight = 2

  [languages.zh]
    languageCode = "zh"
    languageName = "中文"
    weight = 5
    [languages.zh.params]
      description = "独立分析研究：订阅经济学、行为科学、物理学。数据驱动，AI协作，开放许可。"
    [[languages.zh.menu.main]]
      name = "研究"
      url = "/zh/research/"
      weight = 1
    [[languages.zh.menu.main]]
      name = "关于本站"
      url = "/zh/colophon/"
      weight = 2

[taxonomies]
  tag = "tags"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

# Disable sitemap for taxonomy term pages (thin content)
[outputFormats]
  [outputFormats.SITEMAP]
    baseName = "sitemap"
    mediaType = "application/xml"

# Exclude tag pages from sitemap
[params.seo]
  excludeTagsFromSitemap = true
