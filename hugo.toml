      weight = 2
    [[languages.zh.menu.main]]
      name = "关于本站"
      url = "/zh/colophon/"
      weight = 3

[taxonomies]
  tag = "tags"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

# Disable sitemap for taxonomy term pages (thin content)
[outputFormats]
  [outputFormats.SITEMAP]
    baseName = "sitemap"
    mediaType = "application/xml"

# Exclude tag pages from sitemap
[params.seo]
  excludeTagsFromSitemap = true
