{{ define "main" }}
<div class="container">
  <div class="page-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <div class="research-item">
      <a href="{{ .Permalink }}">
        <h2>{{ .Title }}</h2>
        {{ with .Params.description }}<p class="excerpt">{{ . }}</p>{{ end }}
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
