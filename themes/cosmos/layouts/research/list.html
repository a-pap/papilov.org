{{ define "main" }}
<div class="container">
  <div class="research-list">
    <h1>{{ .Title }}</h1>
    <ul class="bullet-list">
      {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        <span class="meta-inline">({{ .Date.Format "2006" }})</span>
      </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
